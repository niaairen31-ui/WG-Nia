<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>World Engine — Cockpit</title>
<style>
/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

/* ── Design tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:        #0d1117;
  --panel:     #161b22;
  --card:      #21262d;
  --border:    #30363d;
  --text:      #c9d1d9;
  --muted:     #8b949e;
  --accent:    #58a6ff;
  --green:     #3fb950;
  --yellow:    #d29922;
  --red:       #f85149;
  --radius:    6px;
  --mono:      "SFMono-Regular", Consolas, "Liberation Mono", monospace;
}

/* ── Base ────────────────────────────────────────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header h1 { font-size: 15px; font-weight: 600; }
header .sub { color: var(--muted); font-size: 12px; }
header .spacer { flex: 1; }
header .local-badge {
  font-size: 11px;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
}

/* ── Two-column layout ───────────────────────────────────────────────────── */
.layout {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: 300px 1fr;
  overflow: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────────────────────── */
.sidebar {
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-head {
  flex-shrink: 0;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-head button { margin-left: auto; }
.conv-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
.conv-item {
  padding: 9px 14px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.conv-item:hover  { background: rgba(255,255,255,0.04); }
.conv-item.active { background: var(--card); border-left-color: var(--accent); }
.conv-item .ci-id { font-family: var(--mono); font-size: 12px; color: var(--accent); }
.conv-item .ci-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Right column ────────────────────────────────────────────────────────── */
.right-col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Transcript panel ────────────────────────────────────────────────────── */
.transcript-panel {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid var(--border);
}
.panel-head {
  flex-shrink: 0;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-head h2 { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.analyze-status { font-size: 12px; color: var(--muted); white-space: nowrap; }

.transcript-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── Chat messages ───────────────────────────────────────────────────────── */
.msg { display: flex; flex-direction: column; max-width: 72%; gap: 3px; }
.msg.player { align-self: flex-end; align-items: flex-end; }
.msg.npc    { align-self: flex-start; align-items: flex-start; }
.msg.mj     { align-self: flex-start; align-items: flex-start; }
.msg-name { font-size: 11px; color: var(--muted); padding: 0 6px; }
.msg-bubble {
  padding: 8px 13px;
  border-radius: var(--radius);
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.5;
}
.msg.player .msg-bubble {
  background: #1c3a5e;
  border-bottom-right-radius: 2px;
  color: #79c0ff;
}
.msg.npc .msg-bubble {
  background: #1a2e1a;
  border-bottom-left-radius: 2px;
  color: #7ee787;
}
/* MJ narration: warm amber/sepia — clearly distinct from player (blue) and
   raw NPC (green). This is the presentation layer the player reads. */
.msg.mj .msg-bubble {
  background: #251e10;
  border-bottom-left-radius: 2px;
  color: #d4b896;
}

/* NPC raw annotation — muted secondary text shown below the MJ narration
   for creator audit (verify the MJ preserved the NPC's words verbatim). */
.npc-raw-annotation {
  align-self: flex-start;
  max-width: 72%;
  padding: 2px 8px 8px;
  font-size: 11px;
  color: var(--muted);
  font-style: italic;
  line-height: 1.5;
  margin-top: -2px;
}
.npc-raw-label { font-weight: 600; opacity: 0.8; margin-right: 4px; }
.mode-badge { font-size: 0.7rem; font-weight: 700; padding: 1px 5px; border-radius: 3px;
  background: #e2e8f0; color: #4a5568; margin-left: 5px; vertical-align: middle;
  letter-spacing: 0.02em; }
.mode-badge.b-scene        { background: #e8f4f8; color: #2b6cb0; }
.mode-badge.b-npc_reaction { background: #fef3e2; color: #c05621; }
.mode-badge.b-dialogue     { background: #f0fff4; color: #276749; }

/* ── Queue panel ─────────────────────────────────────────────────────────── */
.queue-panel {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.queue-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.filter-bar { display: flex; gap: 4px; }
.f-btn {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
}
.f-btn:hover  { color: var(--text); border-color: var(--muted); }
.f-btn.active { background: var(--card); color: var(--text); border-color: var(--accent); }

/* ── Mutation card ───────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  /* flex-shrink: 0 prevents the card from being compressed by the flex-column
     parent (.queue-body). Without this, 3+ cards shrink to fit the container
     height and overflow:hidden clips their content. The parent scrolls instead. */
  flex-shrink: 0;
}
.card.s-applied  { border-left: 3px solid var(--green); }
.card.s-rejected { border-left: 3px solid var(--red);   opacity: 0.6; }
.card.s-approved { border-left: 3px solid var(--yellow); }

.card-head {
  padding: 9px 13px;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}
.card-head .ts { margin-left: auto; font-size: 11px; color: var(--muted); }

/* Rationale block — the reason the AI proposed the change */
.card-rationale {
  padding: 10px 13px;
  border-bottom: 1px solid var(--border);
  font-style: italic;
  color: var(--text);
  line-height: 1.5;
}
.card-rationale::before { content: '\201C'; color: var(--muted); margin-right: 2px; }
.card-rationale::after  { content: '\201D'; color: var(--muted); margin-left: 2px; }

.card-fields {
  padding: 11px 13px;
  display: flex;
  flex-direction: column;
  gap: 9px;
  border-bottom: 1px solid var(--border);
}
.field-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--muted);
  margin-bottom: 3px;
}
textarea.payload {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 7px;
  resize: vertical;
  min-height: 72px;
}
textarea.payload:focus { outline: none; border-color: var(--accent); }
textarea.payload[readonly] { opacity: 0.7; }
input.notes {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 5px 8px;
}
input.notes:focus { outline: none; border-color: var(--accent); }
input.notes[readonly] { opacity: 0.7; }
input.notes::placeholder { color: var(--muted); }

.card-actions {
  padding: 9px 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-result {
  font-size: 12px;
  padding: 0 13px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.2s, padding 0.2s;
  white-space: pre-wrap;
}
.card-result.show {
  max-height: 120px;
  padding: 8px 13px;
  border-top: 1px solid var(--border);
}
.r-ok   { color: var(--green); }
.r-warn { color: var(--yellow); }
.r-err  { color: var(--red); }

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
/* mutation_type colours */
.b-relation_change   { background:#0d2138; color:#79c0ff; border:1px solid #1f6feb; }
.b-new_knowledge     { background:#0d2c12; color:#7ee787; border:1px solid #238636; }
.b-knowledge_change  { background:#0d2c12; color:#7ee787; border:1px solid #1a7f37; }
.b-status_change     { background:#271a00; color:#ffa657; border:1px solid #9e6a03; }
.b-event_creation    { background:#1e1130; color:#d2a8ff; border:1px solid #6e40c9; }
.b-entity_creation   { background:#1e1130; color:#d2a8ff; border:1px solid #6e40c9; }
.b-other             { background:#1c2128; color:var(--muted); border:1px solid var(--border); }
/* status colours */
.b-proposed { background:#2b1d00; color:var(--yellow); border:1px solid #9e6a03; }
.b-applied  { background:#0d2c12; color:var(--green);  border:1px solid #238636; }
.b-rejected { background:#2a0e10; color:var(--red);    border:1px solid #b62324; }
.b-approved { background:#0d1f38; color:var(--accent); border:1px solid #1f6feb; }
/* conversation status */
.b-open   { background:#0d2c12; color:var(--green); }
.b-closed { background:#1c2128; color:var(--muted); }

.target-ref { font-family: var(--mono); font-size: 11px; color: var(--muted); }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
button {
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 5px 13px;
  border-radius: var(--radius);
  border: 1px solid;
  transition: filter 0.1s;
}
button:disabled { opacity: 0.4; cursor: not-allowed; }
button:not(:disabled):hover { filter: brightness(1.15); }

.btn-ghost {
  background: transparent;
  border-color: var(--border);
  color: var(--text);
  padding: 4px 11px;
  font-size: 12px;
}
.btn-icon {
  background: transparent;
  border-color: transparent;
  color: var(--muted);
  padding: 4px 8px;
  font-size: 15px;
  line-height: 1;
}
.btn-icon:hover { color: var(--text) !important; filter: none !important; }
.btn-approve {
  background: #12261e;
  border-color: #238636;
  color: var(--green);
  font-weight: 600;
}
.btn-reject {
  background: #2a0e10;
  border-color: #b62324;
  color: var(--red);
  font-weight: 600;
}

/* ── Apply-error block (shown on 'approved' / duplicate-risk cards) ──────── */
/* "approved" status = proposal was reviewed but could NOT be applied to canon:
   unhandled mutation_type, apply error, or duplicate-application guard.
   The creator_notes field holds the stored reason. */
.card-apply-error {
  padding: 9px 13px;
  background: #1f0d0d;
  border-bottom: 1px solid #6b2020;
  color: #f0a0a0;
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
}
.card-apply-error strong { color: var(--red); display: block; margin-bottom: 3px; }

/* Duplicate-risk banner (shown on 'proposed' cards that shadow an applied one) */
.card-dup-warn {
  padding: 9px 13px;
  background: #1f1500;
  border-bottom: 1px solid #9e6a03;
  color: var(--yellow);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
}
.card-dup-warn strong { display: block; margin-bottom: 3px; }

/* ── Empty / info states ─────────────────────────────────────────────────── */
.empty    { color: var(--muted);  font-style: italic; text-align: center; padding: 28px 16px; }
/* Used for the "Needs attention" tab when empty — green = healthy */
.empty-ok { color: var(--green); font-style: italic; text-align: center; padding: 28px 16px; }
.spin  { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Scrollbars ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Play input (shown only for open conversations) ──────────────────────── */
.play-input-area {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.target-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}
.target-row select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 3px 6px;
}
/* ── Scene view (location entry surface, Tier 1 step 3) ── */
.scene-view {
  padding: 20px 24px 12px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  flex: 1;
  overflow-y: auto;
}
.scene-location-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.scene-location-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
}
.scene-location-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.scene-gatherings-title {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: -6px;
}
.scene-gathering-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.scene-gathering-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  font-style: italic;
}
.scene-gathering-members {
  font-size: 12px;
  color: var(--muted);
}
.scene-join-area {
  margin-top: 6px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.scene-join-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.scene-join-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.scene-join-input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px;
  resize: none;
  line-height: 1.5;
  min-height: 38px;
  max-height: 100px;
}
.scene-join-input-row textarea:focus { outline: none; border-color: var(--accent); }
.scene-join-input-row textarea:disabled { opacity: 0.5; }
.scene-join-status {
  font-size: 12px;
  color: var(--muted);
  min-height: 16px;
}
.join-candidates {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.join-candidates button {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 4px 8px;
  cursor: pointer;
}
.join-candidates button:hover { border-color: var(--accent); }
.play-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.play-input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px;
  resize: none;
  line-height: 1.5;
  min-height: 38px;
  max-height: 120px;
}
.play-input-row textarea:focus { outline: none; border-color: var(--accent); }
.play-input-row textarea:disabled { opacity: 0.5; }
.btn-send {
  background: #12261e;
  border-color: #238636;
  color: var(--green);
  font-weight: 600;
  padding: 7px 16px;
  white-space: nowrap;
}
.play-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}
.btn-end {
  background: #2a0e10;
  border-color: #b62324;
  color: var(--red);
  font-size: 11px;
  padding: 3px 10px;
}
.play-hint { font-style: italic; }

/* "réflexion…" streaming indicator */
.msg-thinking .msg-bubble {
  font-style: italic;
  color: var(--muted) !important;
  background: var(--card) !important;
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }

/* ── Start-conversation panel (PROVISIONAL creator scaffolding) ──────────── */
/* This panel is a temporary creator entry point and will be replaced by a
   full player view. The play loop itself (say / end) is the durable piece. */
.start-panel {
  flex-shrink: 0;
  border-bottom: 2px solid var(--border);
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.start-panel-title {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--yellow);
}
.start-panel select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 5px 8px;
}
.start-panel select:focus { outline: none; border-color: var(--accent); }
.btn-start {
  background: #0d2138;
  border-color: #1f6feb;
  color: var(--accent);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 0;
  width: 100%;
}
.start-status { font-size: 11px; min-height: 16px; }
</style>
</head>
<body>

<!-- ══ Header ══════════════════════════════════════════════════════════════ -->
<header>
  <h1>🌍 World Engine</h1>
  <span style="color:var(--border)">│</span>
  <span style="font-weight:600; color:var(--accent)">Cockpit</span>
  <span class="sub">creator review dashboard</span>
  <span class="spacer"></span>
  <span class="local-badge">127.0.0.1 · local only</span>
</header>

<!-- ══ Two-column layout ════════════════════════════════════════════════════ -->
<div class="layout">

  <!-- ── Sidebar: start panel (PROVISIONAL) + conversation list ── -->
  <aside class="sidebar">
    <!-- PROVISIONAL: creator-side NPC selector — will be replaced by a full
         player view. The play / persistence logic is the durable piece. -->
    <div class="start-panel" id="start-panel">
      <div class="start-panel-title">▶ Start a conversation</div>
      <select id="npc-select"><option value="">Loading NPCs…</option></select>
      <button class="btn-start" onclick="startConversation()">Start</button>
      <div class="start-status" id="start-status"></div>
    </div>

    <div class="sidebar-head">
      Conversations
      <button class="btn-icon" onclick="loadConversations()" title="Refresh list">↻</button>
    </div>
    <div class="conv-list" id="conv-list">
      <div class="empty"><span class="spin">⟳</span></div>
    </div>
  </aside>

  <!-- ── Right column: transcript + queue ── -->
  <div class="right-col">

    <!-- ── Transcript ── -->
    <div class="transcript-panel">
      <div class="panel-head">
        <h2 id="transcript-title">Scène</h2>
        <!-- "← Lieu" back button — shown only when a conversation is open -->
        <button class="btn-ghost" id="btn-scene" onclick="showSceneView()"
                style="display:none" title="Retour à la vue du lieu">← Lieu</button>
        <button class="btn-ghost" id="btn-analyze"
                onclick="analyzeConv(false)" disabled>Analyze</button>
        <button class="btn-ghost" id="btn-force"
                onclick="analyzeConv(true)" disabled
                title="Delete existing proposals and re-run">Force</button>
        <span class="analyze-status" id="analyze-status"></span>
      </div>

      <!-- Scene view (location entry surface — shown on load, hidden when
           a conversation is active; see showSceneView / selectConv). -->
      <div class="scene-view" id="scene-view">
        <div class="scene-location-row">
          <span class="scene-location-label">Lieu actuel</span>
          <span class="scene-location-name" id="scene-location-name">
            <span class="spin">⟳</span>
          </span>
        </div>
        <div class="scene-gatherings-title">Groupes présents</div>
        <div id="scene-gathering-list">
          <div class="empty"><span class="spin">⟳</span> Entrée dans le lieu…</div>
        </div>
        <div class="scene-join-area">
          <div class="scene-join-label">Que faites-vous ?</div>
          <div class="scene-join-input-row">
            <textarea id="scene-join-input" rows="2"
              placeholder="Je m'approche de Maelis et Korin à leur table…"
              onkeydown="onSceneKeydown(event)"></textarea>
            <button class="btn-send" id="scene-join-btn" onclick="sceneJoin()">Rejoindre</button>
          </div>
          <div class="scene-join-status" id="scene-join-status"></div>
          <div class="join-candidates" id="scene-join-candidates" style="display:none"></div>
        </div>
      </div>

      <!-- Conversation transcript (hidden until a conversation is selected) -->
      <div class="transcript-body" id="transcript-body" style="display:none"></div>

      <!-- Play input — shown only when the selected conversation is open -->
      <div class="play-input-area" id="play-input-area" style="display:none">
        <!-- Target selector (contract C2 — shown only once the player has
             joined a gathering; absent → conversation stays 1:1, backward
             compatible). "Groupe" lets the MJ pick exactly one responder
             among active members (A3 hybrid); a named NPC always answers
             directly. Doubles as the join-resolution fallback picker. -->
        <div class="target-row" id="target-row" style="display:none">
          <label for="target-select">S'adresser à :</label>
          <select id="target-select"></select>
        </div>
        <div class="play-input-row">
          <textarea id="play-input" rows="2"
            placeholder="Votre réplique…"
            onkeydown="onPlayKeydown(event)"></textarea>
          <button class="btn-send" id="btn-send" onclick="sendPlayerLine()">Envoyer</button>
        </div>
        <div class="play-footer">
          <span class="play-hint" id="play-hint">Entrée pour envoyer · Maj+Entrée pour nouvelle ligne</span>
          <button class="btn-end" id="btn-end" onclick="endConversation()">Terminer</button>
        </div>
      </div>
    </div>

    <!-- ── Review queue ── -->
    <div class="queue-panel">
      <div class="panel-head">
        <h2>Review Queue</h2>
        <div class="filter-bar" id="filter-bar">
          <button class="f-btn active" data-s="proposed"  onclick="setFilter(this,'proposed')">Proposed</button>
          <button class="f-btn"        data-s="approved"  onclick="setFilter(this,'approved')" title="Proposals that were approved but could not be applied to canon (apply error, unhandled type, or duplicate block). Needs creator attention.">⚠ Needs attention</button>
          <button class="f-btn"        data-s="applied"   onclick="setFilter(this,'applied')">Applied</button>
          <button class="f-btn"        data-s="rejected"  onclick="setFilter(this,'rejected')">Rejected</button>
        </div>
        <button class="btn-icon" onclick="loadQueue()" title="Refresh queue">↻</button>
      </div>
      <div class="queue-body" id="queue-body">
        <div class="empty"><span class="spin">⟳</span></div>
      </div>
    </div>

  </div><!-- .right-col -->
</div><!-- .layout -->

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   State
   ════════════════════════════════════════════════════════════════════════════ */
let currentConvId    = null;
let currentConvData  = null;   // full detail object from the server
let currentFilter    = 'proposed';
let _streamingActive = false;  // true while an NPC reply is in flight

/* ════════════════════════════════════════════════════════════════════════════
   Utilities
   ════════════════════════════════════════════════════════════════════════════ */

/** HTML-escape a value (null/undefined → empty string). */
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/** Shorten a UUID for display: first 8 chars + ellipsis. */
function shortId(id) { return id ? id.slice(0, 8) + '…' : ''; }

/** Format an ISO datetime string using local locale. */
function fmtDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleString(undefined, {
      dateStyle: 'short', timeStyle: 'short'
    });
  } catch { return iso; }
}

/**
 * Thin fetch wrapper.
 * Parses the JSON body; throws an Error with `data.detail` on non-2xx.
 */
async function api(path, opts = {}) {
  const res  = await fetch(path, opts);
  const data = await res.json().catch(() => ({ detail: res.statusText }));
  if (!res.ok) throw new Error(data.detail || JSON.stringify(data));
  return data;
}

/* ════════════════════════════════════════════════════════════════════════════
   Scene view — location entry surface (Tier 1, step 3)
   Enters the player's current location on load (idempotent — safe on F5).
   Provides a join-phrase input that creates the conversation when it resolves.
   ════════════════════════════════════════════════════════════════════════════ */

/** Enter the player's current location (idempotent — only generates gathering
 *  partition if none exists yet, so F5 does not reshuffle — contract C1). */
async function loadScene() {
  const nameEl   = document.getElementById('scene-location-name');
  const listEl   = document.getElementById('scene-gathering-list');
  const statusEl = document.getElementById('scene-join-status');
  nameEl.innerHTML = '<span class="spin">⟳</span>';
  listEl.innerHTML = '<div class="empty"><span class="spin">⟳</span> Entrée dans le lieu…</div>';
  statusEl.textContent = '';
  try {
    const scene = await api('/api/scene/enter', { method: 'POST' });
    _renderScene(scene);
  } catch (e) {
    nameEl.textContent = '?';
    listEl.innerHTML = `<div class="empty" style="color:var(--red)">Erreur : ${esc(e.message)}</div>`;
  }
}

/** Render the scene returned by /api/scene/enter (or /api/scene). */
function _renderScene(scene) {
  const nameEl = document.getElementById('scene-location-name');
  const listEl = document.getElementById('scene-gathering-list');

  nameEl.textContent = scene.location_name || '?';
  document.getElementById('transcript-title').textContent = scene.location_name || 'Scène';

  if (!scene.gatherings || !scene.gatherings.length) {
    listEl.innerHTML = '<div class="empty">Personne d\'autre ici pour le moment.</div>';
    return;
  }
  listEl.innerHTML = scene.gatherings.map(g => {
    const npcMembers = (g.members || []).filter(m => m.id !== 'char-player');
    const names = npcMembers.map(m => esc(m.name)).join(', ');
    return `<div class="scene-gathering-card">
      <div class="scene-gathering-label">${esc(g.label || '(groupe sans nom)')}</div>
      ${names ? `<div class="scene-gathering-members">${names}</div>` : ''}
    </div>`;
  }).join('');

  // If the player is already in a gathering, swap the join area for a
  // "resume / continue" panel — the textarea is for ungrouped players only.
  const statusEl  = document.getElementById('scene-join-status');
  const joinArea  = document.getElementById('scene-join-input').parentElement; // .scene-join-input-row
  const joinLabel = joinArea.previousElementSibling; // .scene-join-label
  if (scene.player_gathering) {
    const g      = scene.player_gathering;
    const others = (g.members || []).filter(m => m.id !== 'char-player').map(m => m.name).join(', ');
    const convId = scene.active_conversation_id;
    joinLabel.textContent = 'Vous êtes dans ce groupe';
    joinArea.style.display = 'none';   // hide the textarea row
    // Primary action: resume or start conversation.
    const primaryBtn = convId
      ? `<button class="btn-send" style="margin-left:8px" onclick="selectConv('${esc(convId)}')">Reprendre la conversation</button>`
      : `<button class="btn-send" style="margin-left:8px" onclick="_sceneResumeOrStart()">Continuer à parler</button>`;
    // Secondary action: leave the gathering — always visible.
    const leaveBtn = `<button class="btn-ghost" style="margin-left:8px;font-size:11px" onclick="sceneLeave()">Quitter le groupe</button>`;
    statusEl.innerHTML =
      `Vous faites partie du groupe « ${esc(g.label || '(sans nom)')} »` +
      (others ? ` avec ${esc(others)}` : '') + '.' +
      `<br>${primaryBtn}${leaveBtn}`;
  }
}

/** Enter key in the scene join input submits; Shift+Enter inserts a newline. */
function onSceneKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sceneJoin(); }
}

/** Submit the join-phrase from the scene view.
 *  On success → create the conversation and transition to the transcript view.
 *  On ambiguous → show the gathering picker (C2 fallback). */
async function sceneJoin() {
  const input    = document.getElementById('scene-join-input');
  const btn      = document.getElementById('scene-join-btn');
  const statusEl = document.getElementById('scene-join-status');
  const candEl   = document.getElementById('scene-join-candidates');
  const text     = input.value.trim();
  if (!text) return;

  btn.disabled   = true;
  input.disabled = true;
  statusEl.textContent = 'Interprétation…';
  candEl.style.display = 'none';
  candEl.innerHTML = '';

  try {
    const result = await api('/api/scene/join', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ player_text: text }),
    });

    if (result.conversation_id) {
      // Join resolved → switch to conversation view
      statusEl.textContent = '';
      input.value = '';
      await loadConversations();
      await selectConv(result.conversation_id);
    } else if (result.join_candidates && result.join_candidates.length) {
      statusEl.textContent = 'Quel groupe souhaitez-vous rejoindre ?';
      candEl.style.display = 'flex';
      candEl.innerHTML = result.join_candidates.map(g => {
        const names = (g.members || []).filter(m => m.id !== 'char-player').map(m => esc(m.name)).join(', ');
        const label = esc(g.label || '(groupe sans nom)') + (names ? ' — ' + names : '');
        return `<button onclick="_scenePickGathering('${esc(g.id)}')">${label}</button>`;
      }).join('');
      btn.disabled   = false;
      input.disabled = false;
    } else if (result.already_joined) {
      statusEl.textContent = 'Vous êtes déjà dans ce groupe.';
      if (result.conversation_id) {
        await loadConversations();
        await selectConv(result.conversation_id);
      }
    } else {
      statusEl.textContent = 'Référence non reconnue — essayez de nommer le groupe ou un de ses membres.';
      btn.disabled   = false;
      input.disabled = false;
    }
  } catch (e) {
    statusEl.textContent = '⚠ ' + e.message;
    btn.disabled   = false;
    input.disabled = false;
  }
}

/** Explicit gathering pick from the C2 fallback picker (scene view).
 *  Takes the first NPC member name from the chosen gathering and calls
 *  scene/join with it — a single-NPC name always resolves unambiguously
 *  when the player is ungrouped (A2 contract). */
async function _scenePickGathering(gatheringId) {
  const statusEl = document.getElementById('scene-join-status');
  const candEl   = document.getElementById('scene-join-candidates');
  candEl.querySelectorAll('button').forEach(b => b.disabled = true);
  statusEl.textContent = 'Rejoindre…';
  try {
    // Re-read the scene to get current members (stale cache-safe).
    const sceneData = await api('/api/scene');
    const gathering = (sceneData.gatherings || []).find(g => g.id === gatheringId);
    if (!gathering) { statusEl.textContent = 'Groupe introuvable.'; return; }
    const firstNpc = (gathering.members || []).find(m => m.id !== 'char-player');
    if (!firstNpc) { statusEl.textContent = 'Ce groupe est vide.'; return; }

    // Pass the NPC name as the reference — always resolves to exactly one gathering.
    const result = await api('/api/scene/join', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ player_text: firstNpc.name }),
    });
    candEl.style.display = 'none';
    if (result.conversation_id) {
      await loadConversations();
      await selectConv(result.conversation_id);
    } else {
      statusEl.textContent = 'Impossible de rejoindre ce groupe.';
      candEl.querySelectorAll('button').forEach(b => b.disabled = false);
    }
  } catch (e) {
    statusEl.textContent = '⚠ ' + e.message;
    candEl.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

/** Called when the player is already in a gathering but has no open
 *  conversation. POST /api/scene/join now creates one in that case. */
async function _sceneResumeOrStart() {
  const statusEl = document.getElementById('scene-join-status');
  statusEl.innerHTML = 'Création de la conversation…';
  try {
    // Any text works — scene/join detects already_joined and creates a new conv.
    const result = await api('/api/scene/join', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ player_text: '.' }),
    });
    if (result.conversation_id) {
      await loadConversations();
      await selectConv(result.conversation_id);
    } else {
      statusEl.textContent = '⚠ Impossible de démarrer la conversation.';
    }
  } catch (e) {
    statusEl.textContent = '⚠ ' + e.message;
  }
}

/** Leave the current gathering, close the open conversation, and return to
 *  the ungrouped scene view so the player can choose what to do next. */
async function sceneLeave() {
  const statusEl = document.getElementById('scene-join-status');
  const joinArea  = document.getElementById('scene-join-input').parentElement;
  const joinLabel = joinArea.previousElementSibling;
  statusEl.innerHTML = 'Quitter le groupe…';
  try {
    const scene = await api('/api/scene/leave', { method: 'POST' });
    // Restore the join area (hidden while player was grouped).
    joinArea.style.display = '';
    joinLabel.textContent  = 'Que faites-vous ?';
    document.getElementById('scene-join-input').disabled = false;
    document.getElementById('scene-join-btn').disabled   = false;
    document.getElementById('scene-join-candidates').style.display = 'none';
    // Render the fresh scene (player is now ungrouped → full picker shown).
    _renderScene(scene);
    // Refresh the conversation list so the closed conv appears correctly.
    await loadConversations();
  } catch (e) {
    statusEl.textContent = '⚠ ' + e.message;
  }
}

/** Show the scene view (hide conversation transcript + play input).
 *  Re-loads the scene so the "Reprendre / Continuer" state refreshes. */
async function showSceneView() {
  document.getElementById('scene-view').style.display      = 'flex';
  document.getElementById('transcript-body').style.display = 'none';
  document.getElementById('play-input-area').style.display = 'none';
  document.getElementById('btn-scene').style.display       = 'none';
  document.getElementById('transcript-title').textContent  =
    document.getElementById('scene-location-name').textContent || 'Scène';
  currentConvId   = null;
  currentConvData = null;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  // Restore the join area in case it was hidden for an already-grouped player.
  const joinArea  = document.getElementById('scene-join-input').parentElement;
  const joinLabel = joinArea.previousElementSibling;
  joinArea.style.display  = '';
  joinLabel.textContent   = 'Que faites-vous ?';
  document.getElementById('scene-join-status').innerHTML = '';
  document.getElementById('scene-join-input').disabled = false;
  document.getElementById('scene-join-btn').disabled   = false;
  // Re-read the scene (fast, no enter_location) to update the join area state.
  await loadScene();
}

/* ════════════════════════════════════════════════════════════════════════════
   Start conversation (PROVISIONAL creator scaffolding)
   — This panel will be replaced by a full player view.
   ════════════════════════════════════════════════════════════════════════════ */

async function loadNpcs() {
  const sel = document.getElementById('npc-select');
  try {
    const npcs = await api('/api/npcs');
    if (!npcs.length) {
      sel.innerHTML = '<option value="">No NPCs found</option>';
      return;
    }
    sel.innerHTML = npcs.map(n =>
      `<option value="${esc(n.id)}">${esc(n.name)}${n.faction ? ' · ' + esc(n.faction) : ''}</option>`
    ).join('');
  } catch (e) {
    sel.innerHTML = '<option value="">Error loading NPCs</option>';
  }
}

async function startConversation() {
  const sel    = document.getElementById('npc-select');
  const status = document.getElementById('start-status');
  const npcId  = sel.value;
  if (!npcId) return;

  status.style.color = 'var(--muted)';
  status.textContent = '⟳ Démarrage…';

  try {
    const data = await api('/api/conversations/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ npc_id: npcId }),
    });
    status.style.color = 'var(--green)';
    status.textContent = '✓ Conversation ouverte';
    // Reload list and immediately select the new conversation.
    await loadConversations();
    await selectConv(data.conversation_id);
  } catch (e) {
    status.style.color = 'var(--red)';
    status.textContent = '✗ ' + e.message;
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   Conversations
   ════════════════════════════════════════════════════════════════════════════ */

async function loadConversations() {
  const el = document.getElementById('conv-list');
  el.innerHTML = '<div class="empty"><span class="spin">⟳</span></div>';
  try {
    const convs = await api('/api/conversations');
    if (!convs.length) {
      el.innerHTML = '<div class="empty">No conversations in the database.</div>';
      return;
    }
    el.innerHTML = convs.map(c => `
      <div class="conv-item" id="ci-${esc(c.id)}" onclick="selectConv('${esc(c.id)}')">
        <div class="ci-id">${esc(shortId(c.id))}</div>
        <div class="ci-meta">
          <span class="badge b-${esc(c.status)}">${esc(c.status)}</span>
          ${c.location ? ' · ' + esc(c.location) : ''}
          · ${c.message_count} msg${c.message_count !== 1 ? 's' : ''}
          <br>${fmtDate(c.started_at)}
        </div>
      </div>`).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
  }
}

async function selectConv(id) {
  currentConvId = id;

  // Switch from scene view to conversation view.
  document.getElementById('scene-view').style.display      = 'none';
  document.getElementById('transcript-body').style.display = '';
  document.getElementById('btn-scene').style.display       = 'inline-flex';

  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('ci-' + id);
  if (item) item.classList.add('active');

  document.getElementById('btn-analyze').disabled = false;
  document.getElementById('btn-force').disabled   = false;
  document.getElementById('analyze-status').textContent = '';

  const body = document.getElementById('transcript-body');
  body.innerHTML = '<div class="empty"><span class="spin">⟳</span> Loading…</div>';
  document.getElementById('transcript-title').textContent = 'Transcript';

  try {
    const data = await api('/api/conversations/' + id);
    currentConvData = data;
    renderTranscript(data);
    document.getElementById('transcript-title').textContent =
      (data.npc_name || '?') + ' ↔ ' + (data.player_name || '?') +
      (data.location ? '  ·  ' + data.location : '');
    _renderTargetSelector(data);
    setPlayInputVisible(data.status === 'open');
  } catch (e) {
    body.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
    setPlayInputVisible(false);
  }
}

/** Show or hide the play input area based on conversation status. */
function setPlayInputVisible(open) {
  const area = document.getElementById('play-input-area');
  area.style.display = open ? 'flex' : 'none';
  if (open) {
    document.getElementById('play-input').focus();
  }
}

/** Populate the speaker-target selector (contract C2 — A3 hybrid).
 *  Only shown once the conversation is anchored to a gathering: "Groupe"
 *  (the MJ picks exactly one active member to answer) plus one option per
 *  active co-member (that NPC answers directly). Absent gathering → the
 *  selector stays hidden and /say defaults to the seed NPC, unchanged. */
function _renderTargetSelector(data) {
  const row    = document.getElementById('target-row');
  const select = document.getElementById('target-select');
  const gathering = data.gathering;

  if (!gathering || !gathering.members || !gathering.members.length) {
    row.style.display = 'none';
    select.innerHTML = '';
    return;
  }

  const options = [`<option value="group">Le groupe (${esc(gathering.label || 'sans nom')})</option>`];
  for (const m of gathering.members) {
    if (m.id === data.player_id) continue;
    options.push(`<option value="${esc(m.id)}">${esc(m.name)}</option>`);
  }
  select.innerHTML = options.join('');
  row.style.display = 'flex';
}

function renderTranscript(data) {
  const body = document.getElementById('transcript-body');
  if (!data.messages || !data.messages.length) {
    body.innerHTML = '<div class="empty">No messages yet — say something!</div>';
    return;
  }
  const msgs = data.messages;
  const parts = [];
  let i = 0;
  while (i < msgs.length) {
    const m = msgs[i];
    // Pair consecutive npc+mj rows (produced by the MJ flow): render mj
    // narration first (primary), then the raw npc line as a muted annotation
    // below it so the creator can verify the MJ quoted verbatim.
    if (m.speaker === 'npc' && i + 1 < msgs.length && msgs[i + 1].speaker === 'mj') {
      parts.push(mjPairHtml(msgs[i + 1], m));
      i += 2;
    } else {
      parts.push(msgHtml(m));
      i++;
    }
  }
  body.innerHTML = parts.join('');
  body.scrollTop = body.scrollHeight;
}

/** MJ narration bubble + NPC raw annotation below (reader / audit view). */
function mjPairHtml(mjMsg, npcMsg) {
  return `<div class="msg mj" id="msg-${esc(mjMsg.id || '')}">
    <div class="msg-name">${esc(mjMsg.display_name)}</div>
    <div class="msg-bubble">${esc(mjMsg.content)}</div>
  </div>
  <div class="npc-raw-annotation">
    <span class="npc-raw-label">${esc(npcMsg.display_name)} (brut) :</span>${esc(npcMsg.content)}
  </div>`;
}

/** Build the HTML for a single message bubble (player, or legacy npc/mj). */
function msgHtml(m) {
  return `<div class="msg ${esc(m.speaker)}" id="msg-${esc(m.id || '')}">
    <div class="msg-name">${esc(m.display_name)}</div>
    <div class="msg-bubble">${esc(m.content)}</div>
  </div>`;
}

/* ════════════════════════════════════════════════════════════════════════════
   Play loop — send / stream / end
   ════════════════════════════════════════════════════════════════════════════ */

/** Enter key sends; Shift+Enter inserts a newline. */
function onPlayKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPlayerLine();
  }
}

async function sendPlayerLine() {
  if (_streamingActive || !currentConvId) return;

  const inputEl  = document.getElementById('play-input');
  const sendBtn  = document.getElementById('btn-send');
  const endBtn   = document.getElementById('btn-end');
  const content  = inputEl.value.trim();
  if (!content) return;

  inputEl.value = '';
  _streamingActive = true;
  inputEl.disabled = true;
  sendBtn.disabled = true;
  endBtn.disabled  = true;

  const transcriptEl = document.getElementById('transcript-body');
  const npcName    = currentConvData ? currentConvData.npc_name : 'PNJ';
  const playerName = currentConvData ? currentConvData.player_name : 'Joueur';

  // Append player line immediately.
  _appendBubble(transcriptEl, 'player', playerName, content);

  // "réflexion…" indicator covers the entire hidden phase:
  // NPC generation (buffered server-side) + MJ setup until the first narration token.
  const thinkEl = _appendBubble(transcriptEl, 'npc msg-thinking', npcName, 'réflexion…');

  // MJ bubble is created on the first token (thinkEl replaced then).
  // If no tokens arrive (error before MJ starts), finally cleans up thinkEl.
  let mjBubble = null;
  let npcRawContent = null;
  let turnMode = null;
  let joinedInfo = null;       // {gathering_id, label} — resolved join (phase 0c)
  let joinCandidates = null;   // [_gathering_brief, ...] — unresolved join, player picks

  /** Replace indicator with MJ narration bubble; return its text node. */
  const _ensureMj = () => {
    if (!mjBubble) {
      thinkEl.remove();
      mjBubble = _appendBubble(transcriptEl, 'mj', 'Narration', '');
    }
    return mjBubble.querySelector('.msg-bubble');
  };

  // Speaker target (contract C2 — A3 hybrid). The selector is only visible
  // once the player has joined a gathering; otherwise omit it entirely so
  // /say keeps its 1:1 backward-compatible default (conv.npc_id answers).
  const targetRow = document.getElementById('target-row');
  const targetSel = document.getElementById('target-select');
  const target = (targetRow.style.display !== 'none' && targetSel.value) ? targetSel.value : null;

  try {
    const res = await fetch('/api/conversations/' + currentConvId + '/say', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(target ? { content, target } : { content }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Request failed');
    }

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let lineBuffer = '';

    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      lineBuffer += decoder.decode(value, { stream: true });

      const lines = lineBuffer.split('\n');
      lineBuffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6);
        if (payload === '[DONE]') break outer;
        let token;
        try { token = JSON.parse(payload); } catch { continue; }

        if (token && typeof token === 'object' && token !== null) {
          if (token.error) {
            // Server error — show it in the MJ bubble.
            const bt = _ensureMj();
            bt.style.color = 'var(--red)';
            bt.textContent = '⚠ ' + token.error;
            break outer;
          }
          if (typeof token.npc_raw === 'string') {
            // Raw NPC line delivered after MJ narration stream completes.
            // Stored here; appended below after the loop.
            npcRawContent = token.npc_raw;
            continue;
          }
          if (typeof token.mode === 'string') {
            // Routing mode chosen by the MJ interpretation pass (dialogue /
            // npc_reaction / scene / join). Stored for the audit annotation.
            turnMode = token.mode;
            continue;
          }
          if (token.joined) {
            // Join resolved (contract A2 — name/label matched a single open
            // gathering). Conversation is now anchored; refresh after the
            // stream so the target selector picks up the new roster.
            joinedInfo = token.joined;
            continue;
          }
          if (Array.isArray(token.join_candidates)) {
            // Resolution failed (ambiguous/not found) — cockpit fallback:
            // let the player pick from the open gatherings (reuses C2).
            joinCandidates = token.join_candidates;
            continue;
          }
        } else if (typeof token === 'string') {
          // MJ narration token — create bubble on first one (drops indicator).
          const bt = _ensureMj();
          bt.textContent += token;
          transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }
      }
    }

    // Append the NPC raw annotation below the MJ narration for creator audit.
    // Always shown when we have mode info (even scene turns with no NPC output).
    if (npcRawContent !== null || turnMode !== null) {
      _appendNpcRaw(transcriptEl, npcName, npcRawContent ?? '', turnMode);
    }

    if (joinedInfo) {
      // Anchored to a gathering — reload conversation data so the target
      // selector (C2) populates from the new roster (D1 co-presence).
      const fresh = await api('/api/conversations/' + currentConvId).catch(() => null);
      if (fresh) {
        currentConvData = fresh;
        _renderTargetSelector(fresh);
      }
    } else if (joinCandidates && joinCandidates.length) {
      _renderJoinCandidates(transcriptEl, joinCandidates);
    }

    // Refresh the sidebar count for this conversation.
    const ciEl = document.getElementById('ci-' + currentConvId);
    if (ciEl) {
      const metaEl = ciEl.querySelector('.ci-meta');
      if (metaEl) {
        const convs = await api('/api/conversations').catch(() => null);
        if (convs) {
          const updated = convs.find(c => c.id === currentConvId);
          if (updated) {
            metaEl.innerHTML =
              `<span class="badge b-${esc(updated.status)}">${esc(updated.status)}</span>` +
              (updated.location ? ' · ' + esc(updated.location) : '') +
              ` · ${updated.message_count} msg${updated.message_count !== 1 ? 's' : ''}` +
              `<br>${fmtDate(updated.started_at)}`;
          }
        }
      }
    }

  } catch (e) {
    const bt = _ensureMj();
    bt.style.color = 'var(--red)';
    bt.textContent = '⚠ Erreur : ' + e.message;
  } finally {
    // If no tokens arrived (error before MJ started), thinkEl was never removed.
    if (!mjBubble && document.body.contains(thinkEl)) thinkEl.remove();
    _streamingActive = false;
    inputEl.disabled = false;
    sendBtn.disabled = false;
    endBtn.disabled  = false;
    inputEl.focus();
  }
}

/** Append the NPC raw annotation below the MJ narration bubble (live play).
 *  mode (optional): routing mode from the MJ interpretation pass.
 *  - dialogue     → show raw NPC text as-is (existing behavior).
 *  - npc_reaction → show raw wordless gesture.
 *  - scene        → no NPC was called; show "(aucun PNJ impliqué)" instead.
 */
function _appendNpcRaw(container, npcName, content, mode) {
  const el = document.createElement('div');
  el.className = 'npc-raw-annotation';
  const modeTag = mode
    ? ` <span class="mode-badge b-${esc(mode)}">[${esc(mode)}]</span>`
    : '';
  const body = (mode === 'scene' || mode === 'join')
    ? '<em>(aucun PNJ impliqué)</em>'
    : esc(content);
  el.innerHTML =
    `<span class="npc-raw-label">${esc(npcName)} (brut) :${modeTag}</span> ${body}`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

/** Cockpit fallback for an unresolved 'join' intent (contract A2 — ambiguous
 *  or not-found reference). Reuses the C2 target-selector roster info: one
 *  button per open gathering, labelled with its members; clicking calls
 *  POST /join directly (not a canon mutation — see ARCHITECTURE_DECISIONS.md). */
function _renderJoinCandidates(container, candidates) {
  const wrap = document.createElement('div');
  wrap.className = 'join-candidates';
  for (const g of candidates) {
    const names = (g.members || []).map(m => m.name).join(', ');
    const btn = document.createElement('button');
    btn.textContent = (g.label || 'Groupe') + (names ? ' — ' + names : '');
    btn.onclick = () => _joinGathering(g.id, btn);
    wrap.appendChild(btn);
  }
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

/** Join the chosen gathering via the explicit /join endpoint, then refresh
 *  the conversation so the target selector (C2) reflects the new roster. */
async function _joinGathering(gatheringId, triggerBtn) {
  if (!currentConvId) return;
  const wrap = triggerBtn.closest('.join-candidates');
  if (wrap) wrap.querySelectorAll('button').forEach(b => b.disabled = true);
  try {
    await api('/api/conversations/' + currentConvId + '/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ gathering_id: gatheringId }),
    });
    if (wrap) wrap.remove();
    const fresh = await api('/api/conversations/' + currentConvId).catch(() => null);
    if (fresh) {
      currentConvData = fresh;
      _renderTargetSelector(fresh);
    }
  } catch (e) {
    if (wrap) wrap.querySelectorAll('button').forEach(b => b.disabled = false);
    alert('Erreur en rejoignant le groupe : ' + e.message);
  }
}

/** Append a message bubble to the transcript and scroll into view. */
function _appendBubble(container, speakerClass, displayName, content) {
  const el = document.createElement('div');
  el.className = 'msg ' + speakerClass;
  el.innerHTML =
    `<div class="msg-name">${esc(displayName)}</div>` +
    `<div class="msg-bubble">${esc(content)}</div>`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

async function endConversation() {
  if (_streamingActive || !currentConvId) return;
  const endBtn = document.getElementById('btn-end');
  endBtn.disabled = true;
  try {
    await api('/api/conversations/' + currentConvId + '/end', { method: 'POST' });
    setPlayInputVisible(false);
    // Update the sidebar badge and refresh the transcript header.
    await loadConversations();
    // Re-highlight the current item.
    const item = document.getElementById('ci-' + currentConvId);
    if (item) item.classList.add('active');
    // Re-enable analyze buttons.
    document.getElementById('btn-analyze').disabled = false;
    document.getElementById('btn-force').disabled   = false;
    // Update conversation data status.
    if (currentConvData) currentConvData.status = 'closed';
  } catch (e) {
    endBtn.disabled = false;
    alert('Erreur : ' + e.message);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   Analysis
   ════════════════════════════════════════════════════════════════════════════ */

async function analyzeConv(force) {
  if (!currentConvId) return;

  const btnA   = document.getElementById('btn-analyze');
  const btnF   = document.getElementById('btn-force');
  const status = document.getElementById('analyze-status');

  btnA.disabled = true;
  btnF.disabled = true;
  status.style.color = 'var(--muted)';
  status.textContent = '⟳ Analyzing…';

  try {
    const data = await api(
      '/api/conversations/' + currentConvId + '/analyze?force=' + force,
      { method: 'POST' }
    );
    const n = data.count || 0;
    if (data.status === 'existing') {
      status.textContent = `↩ ${n} existing proposal${n !== 1 ? 's' : ''} — use Force to re-run`;
    } else {
      status.textContent = `✓ ${n} proposal${n !== 1 ? 's' : ''} written`;
    }
    // Switch to proposed tab and reload the queue so new proposals are visible.
    setFilterByName('proposed');
    await loadQueue();
  } catch (e) {
    status.style.color = 'var(--red)';
    status.textContent = '✗ ' + e.message;
  } finally {
    btnA.disabled = false;
    btnF.disabled = false;
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   Review queue
   ════════════════════════════════════════════════════════════════════════════ */

function setFilter(btn, status) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = status;
  loadQueue();
}

function setFilterByName(status) {
  const btn = document.querySelector(`.f-btn[data-s="${status}"]`);
  if (btn) {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = status;
  }
}

async function loadQueue() {
  const body = document.getElementById('queue-body');
  try {
    const mutations = await api('/api/mutations?status=' + currentFilter);
    if (!mutations.length) {
      // "approved" (Needs attention) being empty is the healthy, expected state.
      if (currentFilter === 'approved') {
        body.innerHTML =
          '<div class="empty-ok">✓ Empty — no apply errors or duplicate blocks.' +
          '<br>This is the normal, healthy state.</div>';
      } else {
        body.innerHTML = `<div class="empty">No "${esc(currentFilter)}" proposals.</div>`;
      }
      return;
    }
    body.innerHTML = mutations.map(renderCard).join('');
  } catch (e) {
    body.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${esc(e.message)}</div>`;
  }
}

function renderCard(m) {
  const editable   = (m.status === 'proposed');
  const payloadStr = JSON.stringify(m.payload, null, 2);

  const targetTxt = [m.target_table, m.target_id ? shortId(m.target_id) : null]
    .filter(Boolean).join(' · ');

  const sourceRef = m.conversation_id
    ? `conv:${shortId(m.conversation_id)}`
    : m.pass_play_id
      ? `pass-play:${shortId(m.pass_play_id)}`
      : '';

  // "approved" status = approved but NOT applied to canon.
  // creator_notes holds the stored reason (apply error or duplicate block).
  const applyErrorBlock = (m.status === 'approved' && m.creator_notes)
    ? `<div class="card-apply-error"><strong>⚠ Could not apply to canon — needs attention:</strong>${esc(m.creator_notes)}</div>`
    : '';

  // Duplicate-risk banner: the backend sets applied_duplicate when a logically
  // equivalent mutation was already applied for this conversation.
  const dupBlock = m.applied_duplicate
    ? `<div class="card-dup-warn"><strong>⚠ Duplicate risk — approving will be blocked:</strong>${esc(m.applied_duplicate)}</div>`
    : '';

  return `
<div class="card s-${esc(m.status)}" id="card-${esc(m.id)}">
  <div class="card-head">
    <span class="badge b-${esc(m.mutation_type)}">${esc(m.mutation_type)}</span>
    ${targetTxt ? `<span class="target-ref">${esc(targetTxt)}</span>` : ''}
    <span class="badge b-${esc(m.status)}">${esc(m.status)}</span>
    ${sourceRef ? `<span class="target-ref">${esc(sourceRef)}</span>` : ''}
    <span class="ts">${fmtDate(m.proposed_at)}</span>
  </div>

  ${applyErrorBlock}${dupBlock}

  <div class="card-rationale">${esc(m.rationale || '(no rationale provided)')}</div>

  <div class="card-fields">
    <div>
      <div class="field-label">Payload</div>
      <textarea class="payload" id="pl-${esc(m.id)}" rows="5"
        spellcheck="false"${editable ? '' : ' readonly'}>${esc(payloadStr)}</textarea>
    </div>
    <div>
      <div class="field-label">Creator notes</div>
      <input class="notes" type="text" id="nt-${esc(m.id)}"
        value="${esc(m.creator_notes || '')}"
        placeholder="${editable ? 'optional note…' : ''}"
        ${editable ? '' : 'readonly'}>
    </div>
  </div>

  ${editable ? `
  <div class="card-actions" id="ca-${esc(m.id)}">
    <button class="btn-approve" id="bap-${esc(m.id)}"
            onclick="doApprove('${esc(m.id)}')">✓ Approve</button>
    <button class="btn-reject"  id="brj-${esc(m.id)}"
            onclick="doReject('${esc(m.id)}')">✗ Reject</button>
  </div>` : ''}

  <div class="card-result" id="cr-${esc(m.id)}"></div>
</div>`;
}

/* ════════════════════════════════════════════════════════════════════════════
   Approve
   ════════════════════════════════════════════════════════════════════════════ */

async function doApprove(id) {
  const plEl  = document.getElementById('pl-' + id);
  const ntEl  = document.getElementById('nt-' + id);
  const crEl  = document.getElementById('cr-' + id);
  const bapEl = document.getElementById('bap-' + id);
  const brjEl = document.getElementById('brj-' + id);

  // Validate JSON before sending — saves a round trip.
  const payloadStr = plEl ? plEl.value : null;
  if (payloadStr) {
    try { JSON.parse(payloadStr); }
    catch (e) { showResult(crEl, 'err', 'Invalid JSON in payload: ' + e.message); return; }
  }

  lockCard(bapEl, brjEl);
  showResult(crEl, '', '⟳ Applying to canon…');

  try {
    const data = await api('/api/mutations/' + id + '/approve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        payload:       payloadStr,
        creator_notes: ntEl ? ntEl.value || null : null,
      }),
    });

    if (data.status === 'applied') {
      showResult(crEl, 'ok', '✓ Applied to canon.');
      markCardDone(id, 'applied');
    } else if (data.status === 'already_applied') {
      showResult(crEl, 'warn', '⚠ Already applied.');
      markCardDone(id, 'applied');
    } else {
      // 'approved' — reviewed but not applied; error stored server-side.
      showResult(crEl, 'warn',
        '⚠ Saved as "approved" (not applied to canon):\n' + (data.error || ''));
      markCardDone(id, 'approved');
    }
  } catch (e) {
    showResult(crEl, 'err', '✗ ' + e.message);
    unlockCard(bapEl, brjEl);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   Reject
   ════════════════════════════════════════════════════════════════════════════ */

async function doReject(id) {
  const ntEl  = document.getElementById('nt-' + id);
  const crEl  = document.getElementById('cr-' + id);
  const bapEl = document.getElementById('bap-' + id);
  const brjEl = document.getElementById('brj-' + id);

  lockCard(bapEl, brjEl);
  showResult(crEl, '', '⟳ Rejecting…');

  try {
    await api('/api/mutations/' + id + '/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ creator_notes: ntEl ? ntEl.value || null : null }),
    });
    showResult(crEl, 'ok', '✓ Rejected. World state unchanged.');
    markCardDone(id, 'rejected');
  } catch (e) {
    showResult(crEl, 'err', '✗ ' + e.message);
    unlockCard(bapEl, brjEl);
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   Card helpers
   ════════════════════════════════════════════════════════════════════════════ */

function showResult(el, cls, msg) {
  if (!el) return;
  el.className = 'card-result show' + (cls ? ' r-' + cls : '');
  el.textContent = msg;
}

function lockCard(bap, brj) {
  if (bap) bap.disabled = true;
  if (brj) brj.disabled = true;
}

function unlockCard(bap, brj) {
  if (bap) bap.disabled = false;
  if (brj) brj.disabled = false;
}

/** Update card visual state after an approve / reject action completes. */
function markCardDone(id, newStatus) {
  const card = document.getElementById('card-' + id);
  if (!card) return;

  // Swap the status colour class on the card border.
  card.className = card.className.replace(/s-\w+/, 's-' + newStatus);

  // Swap the status badge text + class.
  const badge = card.querySelector('.b-proposed, .b-approved');
  if (badge) {
    badge.className = 'badge b-' + newStatus;
    badge.textContent = newStatus;
  }

  // Hide action buttons — card is no longer actionable.
  const actions = document.getElementById('ca-' + id);
  if (actions) actions.style.display = 'none';

  // Make fields read-only.
  const pl = card.querySelector('.payload');
  if (pl) pl.readOnly = true;
  const nt = card.querySelector('.notes');
  if (nt) nt.readOnly = true;
}

/* ════════════════════════════════════════════════════════════════════════════
   Boot
   ════════════════════════════════════════════════════════════════════════════ */

document.addEventListener('DOMContentLoaded', () => {
  loadScene();         // enter the player's location (idempotent, protects C1)
  loadNpcs();
  loadConversations();
  loadQueue();
});
</script>
</body>
</html>
